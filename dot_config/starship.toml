format = """$username$hostname$os$directory$git_branch$git_status$python$nodejs$golang$rust$java$helm$line_break$character"""

right_format = """$kubernetes$terraform$cmd_duration$time"""

[os]
disabled = false
# format = '[$symbol$name]($style) '
format = '\[[$symbol]($style)\] '
style = "bold white"

[os.symbols]
Macos   = "’ģ╣"
Linux   = "’ģ╝"
Ubuntu  = "’īø"
Debian  = "’īå"
Fedora  = "’īŖ"
Arch    = "’īā"
Windows = "’ģ║"

[username]
show_always = false
style_user = "bold yellow"
style_root = "bold red"
format = '[$user]($style)@'

[hostname]
ssh_only = false
format = '[$ssh_symbol$hostname]($style) '
ssh_symbol = "’ĆŻ "
style = "dimmed white"

[directory]
# truncation_length = 3
truncate_to_repo = true
style = "bold blue"

[git_branch]
symbol = "ŅéĀ "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"

# --- Language versions (only shown in relevant project dirs) ---

[python]
symbol = "ŅłĄ "
format = '[$symbol($version)(\($virtualenv\))]($style) '
style = "yellow"
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", "Pipfile", "uv.lock"]
detect_folders = [".venv"]

[nodejs]
symbol = "Ņ£ś "
format = '[$symbol($version)]($style) '
style = "green"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[golang]
symbol = "Ņś” "
format = '[$symbol($version)]($style) '
style = "cyan"
detect_files = ["go.mod", "go.sum", "go.work"]

[rust]
symbol = "Ņ×© "
format = '[$symbol($version)]($style) '
style = "bold red"
detect_files = ["Cargo.toml", "Cargo.lock"]

[java]
symbol = "Ņ£Ė "
format = '[$symbol($version)]($style) '
style = "bold orange"
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts", ".java-version"]

[helm]
disabled = false
symbol = "’å▓ "
format = '[$symbol($version)]($style) '
style = "bold white"
detect_files = ["Chart.yaml"]

# --- Right prompt: infra context ---

[kubernetes]
disabled = false
symbol = "ŌÄł "
format = '[$symbol$context( \($namespace\))]($style) '
contexts = [
  {context_pattern = "docker-desktop", style = "bold green"},
  {context_pattern = "local", style = "green"},
  {context_pattern = "anvil.*", style = "bold yellow"},
  {context_pattern = "geddes.*", style = "bold orange"},
  {context_pattern = ".*unc.*|.*cloudapps.*", style = "bold blue"},
]

[terraform]
disabled = false
symbol = "’āé "
format = '[$symbol$workspace]($style) '
style = "bold purple"
detect_files = ["main.tf", "terraform.tfvars", ".terraform.lock.hcl"]

[cmd_duration]
min_time = 2_000
format = "[’ĆŚ $duration]($style) "
style = "yellow"

[time]
disabled = false
format = '[$time]($style) '
time_format = "%H:%M"
style = "dimmed white"

[character]
success_symbol = "[ŌØ»](bold green)"
error_symbol = "[ŌØ»](bold red)"
